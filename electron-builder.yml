appId: com.voicetoprompt.app
productName: Voice to Prompt
directories:
  output: release
  buildResources: build
compression: maximum
win:
  target:
    - nsis
  icon: public/icon.png
publish: null
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
files:
  - dist/**/*
  - dist-electron/**/*
  - package.json
  - "!**/*.map"
  - "!**/node_modules/.cache/**"
  - "!**/*.ts"
asar: true
asarUnpack:
  - "**/*.node"
  - "**/@nut-tree-fork/**"