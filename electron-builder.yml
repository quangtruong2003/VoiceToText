appId: com.voicetotext.app
productName: Voice to Text
directories:
  output: release
  buildResources: build
compression: maximum
win:
  target:
    - nsis-web
  icon: public/icon.png
publish:
  provider: github
  owner: quangtruong2003
  repo: VoiceToText
nsisWeb:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
files:
  - dist/**/*
  - dist-electron/**/*
  - package.json
  - "!**/*.map"
  - "!**/node_modules/.cache/**"
  - "!**/*.ts"
asar: true
asarUnpack:
  - "**/*.node"
  - "**/@nut-tree-fork/**"